dbHost: ${DB_HOST:localhost}
dbPort: ${DB_PORT:5432}
dbName: ${DB_NAME:elt_database}
dbUsername: ${DB_USERNAME:elt_user}
dbPassword: ${DB_PASSWORD:elt_pass}
dbApplicationName: ${spring.application.name}
dbSchema: ${DB_SCHEMA:app_elo_match_tracker}

audit:
  actor-header: ${AUDIT_ACTOR_HEADER:X-Actor}
  fallback-actor: ${AUDIT_FALLBACK_ACTOR:system}

request-filter:
  header-restrictions:
    enabled: ${REQUEST_HEADER_RESTRICTIONS_ENABLED:true}
    rules: []

app:
  security:
    admin:
      username: ${APP_ADMIN_USERNAME:admin}
      password: ${APP_ADMIN_PASSWORD:admin-pass}
    user:
      username: ${APP_USER_USERNAME:user}
      password: ${APP_USER_PASSWORD:user-pass}

spring:
  application:
    name: elo_match_tracker
    version: 0.0.1.test
    description: Manage player registrations and track 1v1 matches using the Elo ranking system.
  datasource:
    url: jdbc:postgresql://${dbHost}:${dbPort}/${dbName}?ApplicationName=${dbApplicationName}
    username: ${dbUsername}
    password: ${dbPassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2 # default is 10, set to a reasonable value
  flyway:
    schemas: ${dbSchema}
  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_schema: ${dbSchema}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    diskspace:
      enabled: false
  info:
    env:
      enabled: true
  server:
    port: 9090

info:
  app:
    name: ${spring.application.name}
    version: ${spring.application.version}
    description: ${spring.application.description}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
