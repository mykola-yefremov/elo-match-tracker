<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/styles/styles.css}">
    <title>Login</title>
</head>
<body>
<header th:replace="~{fragments :: siteHeader('login')}"></header>

<main class="page-shell auth-shell">
    <section class="panel auth-card">
        <p class="eyebrow">Admin area</p>
        <h1>Sign in</h1>
        <p class="hero-copy">Use an admin account to create players, report matches, and manage tournaments.</p>

        <div class="alert alert-error" th:if="${param.error}">
            <p>Invalid username or password.</p>
        </div>
        <div class="alert alert-success" th:if="${param.logout}">
            <p>You have been signed out.</p>
        </div>

        <form class="auth-form" th:action="@{/login}" method="post">
            <th:block th:replace="~{fragments :: csrfInput}"></th:block>
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" required>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button type="submit">Sign in</button>
        </form>
    </section>
</main>
</body>
</html>
